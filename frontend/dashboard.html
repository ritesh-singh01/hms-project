<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    h2, h3 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .form-grid input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .form-grid input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .delete-btn {
      background: #dc2626;
      padding: 8px 10px;
    }

    .delete-btn:hover {
      background: #b91c1c;
    }

    .edit-btn {
      background: #0ea5e9;
      padding: 8px 10px;
      margin-right: 6px;
    }

    .edit-btn:hover {
      background: #0284c7;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }

    thead {
      background: #f9fafb;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
    }

    tbody tr:nth-child(even) {
      background: #f9fafb;
    }

    #status {
      min-height: 20px;
      margin: 8px 0;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Dashboard</h2>
      <button onclick="logout()">Logout</button>
    </div>

    <h3 id="formTitle">Add Student</h3>
    <form id="studentForm" onsubmit="event.preventDefault(); addStudent();">
      <div class="form-grid">
        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        <input id="password" placeholder="Password">
        <input id="roll" placeholder="Roll No">
        <input id="dept" placeholder="Department">
        <input id="year" type="number" min="1" max="3" placeholder="Year">
      </div>
      <button type="submit" id="submitBtn">Add Student</button>
    </form>
    <h3 style="margin-top: 22px;">Students</h3>
    <p id="status"></p>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Roll No</th>
          <th>Department</th>
          <th>Year</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="studentsTableBody"></tbody>
    </table>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const statusEl = document.getElementById('status');
    const studentsTableBody = document.getElementById('studentsTableBody');
    const studentForm = document.getElementById('studentForm');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const passwordInput = document.getElementById('password');
    let editStudentId = null;

    if (!token) {
      window.location.href = 'login.html';
    }

    async function loadStudents() {
      try {
        statusEl.innerText = 'Loading students...';

        const response = await fetch('http://localhost:5000/api/students', {
          method: 'GET',
          headers: {
            Authorization: `Bearer ${token}`
          }
        });

        if (response.status === 401) {
          localStorage.removeItem('token');
          window.location.href = 'login.html';
          return;
        }

        const data = await response.json();

        if (!response.ok) {
          statusEl.innerText = data.message || 'Failed to load students';
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          statusEl.innerText = 'No students found';
          return;
        }

        statusEl.innerText = '';
        studentsTableBody.innerHTML = data.map(function (student) {
          return `
            <tr>
              <td>${student.id}</td>
              <td>${student.name || ''}</td>
              <td>${student.email || ''}</td>
              <td>${student.roll_no || ''}</td>
              <td>${student.department || ''}</td>
              <td>${student.year || ''}</td>
              <td>
                <button class="edit-btn" onclick="startEditStudentFromEncoded('${encodeURIComponent(JSON.stringify(student))}')">Edit</button>
                <button class="delete-btn" onclick="deleteStudent(${student.id})">Delete</button>
              </td>
            </tr>
          `;
        }).join('');
      } catch (error) {
        statusEl.innerText = 'Server error while loading students';
      }
    }

   async function addStudent() {
  const name = document.querySelector("#name").value.trim();
  const email = document.querySelector("#email").value.trim();
  const password = document.querySelector("#password").value.trim();
  const roll_no = document.querySelector("#roll").value.trim();
  const department = document.querySelector("#dept").value.trim();
  const year = document.querySelector("#year").value.trim();

  if (!name || !email || (!editStudentId && !password) || !roll_no || !department || !year) {
    alert("All fields are required");
    return;
  }

  if (!email.includes("@")) {
    alert("Invalid email");
    return;
  }

  const token = localStorage.getItem("token");

  try {
    let url = "http://localhost:5000/api/students";
    let method = "POST";

    // 👉 UPDATE MODE
    if (editStudentId) {
      url = `http://localhost:5000/api/students/${editStudentId}`;
      method = "PUT";
    }

    const res = await fetch(url, {
      method: method,
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({
        name,
        email,
        password,
        role_id: 2,
        roll_no,
        department,
        year
      })
    });

    const data = await res.json();

    if (res.ok) {
      alert(editStudentId ? "Student updated" : "Student added");
      studentForm.reset();
      resetFormMode();
      loadStudents();   // ✅ FIXED
    } else {
      console.error(data);
      alert(data.message || "Error");
    }

  } catch (err) {
    console.error(err);
    alert("Server error");
  }
}

    function startEditStudentFromEncoded(encodedStudent) {
      const student = JSON.parse(decodeURIComponent(encodedStudent));
      editStudentId = student.id;
      document.getElementById('name').value = student.name || '';
      document.getElementById('email').value = student.email || '';
      document.getElementById('roll').value = student.roll_no || '';
      document.getElementById('dept').value = student.department || '';
      document.getElementById('year').value = student.year || '';
      passwordInput.value = '';
      passwordInput.disabled = true;
      passwordInput.placeholder = 'Password not required for update';
      passwordInput.required = false;
      formTitle.innerText = 'Edit Student';
      submitBtn.innerText = 'Update Student';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetFormMode() {
      editStudentId = null;
      studentForm.reset();
      passwordInput.disabled = false;
      passwordInput.placeholder = 'Password';
      passwordInput.required = false;
      formTitle.innerText = 'Add Student';
      submitBtn.innerText = 'Add Student';
    }

    async function deleteStudent(id) {
  const confirmDelete = confirm("Are you sure you want to delete this student?");
  if (!confirmDelete) return;

  const token = localStorage.getItem("token");

  await fetch(`http://localhost:5000/api/students/${id}`, {
    method: "DELETE",
    headers: {
      Authorization: `Bearer ${token}`
    }
  });

  loadStudents(); // reload
  
}
function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}
loadStudents();
  </script>

</body>
</html>
