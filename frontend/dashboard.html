<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Dashboard</h1>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <h3 id="formTitle">Add Student</h3>
    <form id="studentForm">
      <div class="form-grid">
        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <input id="roll" placeholder="Roll No">
        <input id="dept" placeholder="Department">
        <input id="year" type="number" min="1" max="4" placeholder="Year">
      </div>
      <button type="submit" id="submitBtn" class="add-btn">Add Student</button>
    </form>

    <h3 class="section-title">Students</h3>
    <p id="status"></p>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Roll No</th>
          <th>Department</th>
          <th>Year</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="studentsTableBody"></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
